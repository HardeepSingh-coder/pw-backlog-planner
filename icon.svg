<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#110C24"/>
      <stop offset="50%" stop-color="#090514"/>
      <stop offset="100%" stop-color="#05030A"/>
    </linearGradient>

    <!-- Glowing Lightning Gradient -->
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Neon Indigo Gradient -->
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Base Squircle -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="6"/>

  <!-- Glassmorphic Inner Frame -->
  <rect x="32" y="32" width="448" height="448" rx="92" fill="none" stroke="url(#bolt-grad)" stroke-opacity="0.25" stroke-width="3"/>

  <!-- Abstract Open Book (Left Side) -->
  <g transform="translate(75, 120)" stroke="url(#indigo-grad)" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#subtle-glow)">
    <path d="M 20 180 C 60 160, 110 160, 150 180 L 150 20 C 110 0, 60 0, 20 20 Z" fill="rgba(99, 102, 241, 0.12)"/>
    <path d="M 20 20 L 20 180"/>
    <path d="M 50 60 L 120 60"/>
    <path d="M 50 95 L 120 95"/>
    <path d="M 50 130 L 100 130"/>
  </g>

  <!-- Hourglass / Timer Vector (Right Side) -->
  <g transform="translate(290, 120)" stroke="#EC4899" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#subtle-glow)">
    <path d="M 20 20 L 140 20 L 80 100 L 140 180 L 20 180 L 80 100 Z" fill="rgba(236, 72, 153, 0.12)"/>
    <line x1="20" y1="20" x2="140" y2="20"/>
    <line x1="20" y1="180" x2="140" y2="180"/>
    <!-- Glowing Sand Dots -->
    <circle cx="80" cy="140" r="8" fill="#EC4899" stroke="none"/>
    <circle cx="80" cy="155" r="12" fill="#EC4899" stroke="none"/>
  </g>

  <!-- Centerpiece: Lightning Bolt (PW Power) -->
  <path d="M 285 70 L 180 250 L 260 250 L 225 440 L 340 230 L 260 230 Z" fill="url(#bolt-grad)" filter="url(#neon-glow)"/>
  <path d="M 285 70 L 180 250 L 260 250 L 225 440 L 340 230 L 260 230 Z" fill="#FFFFFF" opacity="0.4"/>

  <!-- Text Badge: PW PLANNER -->
  <text x="256" y="455" font-family="'Plus Jakarta Sans', system-ui, -apple-system, sans-serif" font-weight="800" font-size="32" fill="#F8FAFC" text-anchor="middle" letter-spacing="4">PW PLANNER</text>
</svg>
